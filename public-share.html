<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shared - CloudShare</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .share-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            overflow: hidden;
        }

        .share-header {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .share-header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .share-header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .share-body {
            padding: 40px;
        }

        .share-icon {
            font-size: 80px;
            text-align: center;
            margin-bottom: 20px;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.1));
        }

        .share-info {
            text-align: center;
            margin-bottom: 30px;
        }

        .share-info h2 {
            font-size: 24px;
            color: #1f2937;
            margin-bottom: 8px;
            word-break: break-word;
        }

        .share-info .meta {
            color: #6b7280;
            font-size: 14px;
        }

        .password-form {
            background: #f9fafb;
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .password-form h3 {
            color: #1f2937;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 12px;
            transition: all 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            width: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            background: #f3f4f6;
            color: #1f2937;
        }

        .btn-secondary:hover {
            background: #e5e7eb;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .alert-warning {
            background: #fef3c7;
            color: #92400e;
            border: 1px solid #fde68a;
        }

        .alert-info {
            background: #dbeafe;
            color: #1e40af;
            border: 1px solid #bfdbfe;
        }

        .folder-contents {
            margin-top: 30px;
        }

        .folder-contents h3 {
            color: #1f2937;
            margin-bottom: 16px;
            font-size: 18px;
        }

        .file-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 400px;
            overflow-y: auto;
        }

        .file-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #f9fafb;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            transition: all 0.2s;
        }

        .file-item:hover {
            background: #f3f4f6;
            border-color: #d1d5db;
        }

        .file-item-icon {
            font-size: 24px;
        }

        .file-item-info {
            flex: 1;
        }

        .file-item-name {
            font-weight: 500;
            color: #1f2937;
            margin-bottom: 4px;
        }

        .file-item-meta {
            font-size: 12px;
            color: #6b7280;
        }

        .loading-spinner {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 4px solid #f3f4f6;
            border-top: 4px solid #6366f1;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .expired-message {
            text-align: center;
            padding: 40px;
        }

        .expired-message .icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .expired-message h2 {
            color: #1f2937;
            margin-bottom: 12px;
        }

        .expired-message p {
            color: #6b7280;
        }

        .stats-bar {
            background: #f9fafb;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-around;
            text-align: center;
        }

        .stat-item {
            flex: 1;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #6366f1;
        }

        .stat-label {
            font-size: 12px;
            color: #6b7280;
            margin-top: 4px;
        }

        @media (max-width: 768px) {
            .share-body {
                padding: 24px;
            }

            .share-header h1 {
                font-size: 22px;
            }

            .share-info h2 {
                font-size: 20px;
            }

            .stats-bar {
                flex-direction: column;
                gap: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="share-container">
        <div class="share-header">
            <h1>
                <span>☁️</span>
                <span>CloudShare</span>
            </h1>
            <p>Secure File Sharing</p>
        </div>

        <div class="share-body" id="shareContent">
            <div class="loading-spinner">
                <div class="spinner"></div>
                <p>Loading shared content...</p>
            </div>
        </div>
    </div>

    <script>
        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const shareToken = urlParams.get('token');

        let shareData = null;
        let passwordVerified = false;
        let verifiedPassword = null; // ⭐ Store password globally

        // API Base URL
        function getApiBase() {
            return window.location.hostname === 'localhost' 
                ? 'http://localhost:5000' 
                : `http://${window.location.hostname}:5000`;
        }

        // Load share info
        async function loadShareInfo() {
            if (!shareToken) {
                showError('Invalid share link', 'No share token provided');
                return;
            }

            try {
                const apiBase = getApiBase();
                const response = await fetch(`${apiBase}/api/share/public/${shareToken}`);
                const data = await response.json();

                console.log('📥 Share data loaded:', data);

                if (data.success) {
                    shareData = data.share;
                    displayShareInfo();
                } else {
                    showError('Share not found', data.message || 'This share link is invalid or has expired');
                }
            } catch (error) {
                console.error('❌ Load error:', error);
                showError('Connection error', 'Failed to load shared content');
            }
        }

        // Display share info
        function displayShareInfo() {
            const content = document.getElementById('shareContent');

            // Check if password required and not yet verified
            if (shareData.requires_password && !passwordVerified) {
                content.innerHTML = `
                    <div class="share-icon">${shareData.type === 'folder' ? '📁' : '📄'}</div>
                    <div class="share-info">
                        <h2>${escapeHtml(shareData.file_name || shareData.folder_name)}</h2>
                        <div class="meta">Shared by ${escapeHtml(shareData.owner)}</div>
                    </div>

                    <div class="password-form">
                        <h3>🔒 Password Required</h3>
                        <p style="color: #6b7280; margin-bottom: 16px;">This share is protected. Enter the password to continue.</p>
                        <input type="password" 
                               id="passwordInput" 
                               class="form-input" 
                               placeholder="Enter password"
                               onkeypress="if(event.key==='Enter') verifyPassword()">
                        <button class="btn btn-primary" onclick="verifyPassword()">
                            🔓 Unlock
                        </button>
                    </div>
                `;
                
                setTimeout(() => {
                    document.getElementById('passwordInput')?.focus();
                }, 100);
                return;
            }

            // Display based on type
            if (shareData.type === 'file') {
                displayFileShare();
            } else if (shareData.type === 'folder') {
                displayFolderShare();
            }
        }

        // Display file share
        function displayFileShare() {
            const content = document.getElementById('shareContent');
            const fileSize = formatFileSize(shareData.file_size);
            const icon = getFileIcon(shareData.file_name);

            let limitInfo = '';
            if (shareData.max_downloads) {
                const remaining = shareData.max_downloads - shareData.download_count;
                limitInfo = `<div class="alert alert-info">
                    📊 ${remaining} downloads remaining (${shareData.download_count}/${shareData.max_downloads})
                </div>`;
            }

            let expiryInfo = '';
            if (shareData.expires_at) {
                const expiryDate = new Date(shareData.expires_at);
                const now = new Date();
                const hoursLeft = Math.ceil((expiryDate - now) / (1000 * 60 * 60));
                
                if (hoursLeft > 0) {
                    expiryInfo = `<div class="alert alert-warning">
                        ⏰ Expires in ${hoursLeft} hours
                    </div>`;
                }
            }

            content.innerHTML = `
                <div class="share-icon">${icon}</div>
                <div class="share-info">
                    <h2>${escapeHtml(shareData.file_name)}</h2>
                    <div class="meta">${fileSize} • Shared by ${escapeHtml(shareData.owner)}</div>
                </div>

                ${limitInfo}
                ${expiryInfo}

                <button class="btn btn-primary" onclick="downloadFile()">
                    📥 Download File
                </button>
            `;
        }

        // Display folder share
        function displayFolderShare() {
            const content = document.getElementById('shareContent');
            const folderContents = shareData.folder_contents;

            let limitInfo = '';
            if (shareData.max_views) {
                const remaining = shareData.max_views - shareData.view_count;
                limitInfo = `<div class="alert alert-info">
                    👁️ ${remaining} views remaining (${shareData.view_count}/${shareData.max_views})
                </div>`;
            }

            let filesHTML = '';
            if (folderContents && folderContents.files && folderContents.files.length > 0) {
                filesHTML = folderContents.files.map(file => `
                    <div class="file-item">
                        <div class="file-item-icon">${getFileIcon(file.original_name)}</div>
                        <div class="file-item-info">
                            <div class="file-item-name">${escapeHtml(file.original_name)}</div>
                            <div class="file-item-meta">${formatFileSize(file.size)}</div>
                        </div>
                    </div>
                `).join('');
            } else {
                filesHTML = '<p style="text-align:center;color:#6b7280;padding:20px;">This folder is empty</p>';
            }

            let subfoldersHTML = '';
            if (folderContents && folderContents.folders && folderContents.folders.length > 0) {
                subfoldersHTML = `<h4 style="color:#6b7280;margin-bottom:12px;font-size:14px;">📁 Subfolders (${folderContents.folders.length})</h4>` +
                folderContents.folders.map(folder => `
                    <div class="file-item">
                        <div class="file-item-icon">📁</div>
                        <div class="file-item-info">
                            <div class="file-item-name">${escapeHtml(folder.name)}</div>
                            <div class="file-item-meta">${folder.file_count || 0} items</div>
                        </div>
                    </div>
                `).join('');
            }

            content.innerHTML = `
                <div class="share-icon">📁</div>
                <div class="share-info">
                    <h2>${escapeHtml(shareData.folder_name)}</h2>
                    <div class="meta">Shared by ${escapeHtml(shareData.owner)}</div>
                </div>

                <div class="stats-bar">
                    <div class="stat-item">
                        <div class="stat-value">${folderContents?.total_files || 0}</div>
                        <div class="stat-label">Files</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${folderContents?.total_folders || 0}</div>
                        <div class="stat-label">Folders</div>
                    </div>
                </div>

                ${limitInfo}

                <div class="folder-contents">
                    <h3>📂 Contents</h3>
                    ${subfoldersHTML}
                    <div class="file-list">
                        ${filesHTML}
                    </div>
                </div>

                <button class="btn btn-primary" onclick="downloadFolder()" style="margin-top: 20px;">
                    📦 Download as ZIP
                </button>
            `;
        }

        // Verify password
        async function verifyPassword() {
            const passwordInput = document.getElementById('passwordInput');
            const password = passwordInput?.value;

            if (!password) {
                alert('Please enter a password');
                return;
            }

            try {
                const apiBase = getApiBase();
                
                console.log('🔐 Verifying password for token:', shareToken);
                
                const response = await fetch(`${apiBase}/api/share/public/${shareToken}/verify-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ password })
                });

                const data = await response.json();

                if (data.success) {
                    passwordVerified = true;
                    verifiedPassword = password; // ⭐ STORE PASSWORD
                    console.log('✅ Password verified and stored');
                    displayShareInfo();
                } else {
                    alert('❌ Incorrect password');
                    passwordInput.value = '';
                    passwordInput.focus();
                }
            } catch (error) {
                console.error('❌ Verify error:', error);
                alert('Failed to verify password');
            }
        }

        // Download file
        async function downloadFile() {
            const apiBase = getApiBase();
            
            let url = `${apiBase}/api/share/public/${shareToken}/download`;
            
            // ⭐ Use stored verified password
            if (verifiedPassword) {
                url += `?password=${encodeURIComponent(verifiedPassword)}`;
            }

            console.log('📥 Downloading file from:', url);
            console.log('🔑 Password included:', !!verifiedPassword);

            window.location.href = url;
        }

        // Download folder
        async function downloadFolder() {
            const apiBase = getApiBase();
            
            let url = `${apiBase}/api/share/public/${shareToken}/download`;
            
            // ⭐ Use stored verified password
            if (verifiedPassword) {
                url += `?password=${encodeURIComponent(verifiedPassword)}`;
            }

            console.log('📦 Downloading folder from:', url);
            console.log('🔑 Password included:', !!verifiedPassword);

            window.location.href = url;
        }

        // Show error
        function showError(title, message) {
            const content = document.getElementById('shareContent');
            content.innerHTML = `
                <div class="expired-message">
                    <div class="icon">⚠️</div>
                    <h2>${escapeHtml(title)}</h2>
                    <p>${escapeHtml(message)}</p>
                </div>
            `;
        }

        // Helper functions
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatFileSize(bytes) {
            if (!bytes || bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round((bytes / Math.pow(k, i)) * 100) / 100 + ' ' + sizes[i];
        }

        function getFileIcon(filename) {
            if (!filename) return '📄';
            const ext = filename.split('.').pop().toLowerCase();
            const iconMap = {
                'pdf': '📕', 'doc': '📘', 'docx': '📘', 'txt': '📝',
                'xls': '📊', 'xlsx': '📊', 'csv': '📊', 
                'ppt': '📙', 'pptx': '📙',
                'jpg': '🖼️', 'jpeg': '🖼️', 'png': '🖼️', 'gif': '🎞️',
                'mp4': '🎬', 'avi': '🎬', 'mov': '🎬',
                'mp3': '🎵', 'wav': '🎵',
                'zip': '📦', 'rar': '📦', '7z': '📦',
                'html': '💻', 'css': '🎨', 'js': '⚡'
            };
            return iconMap[ext] || '📄';
        }

        // Initialize
        loadShareInfo();
    </script>
</body>
</html>
